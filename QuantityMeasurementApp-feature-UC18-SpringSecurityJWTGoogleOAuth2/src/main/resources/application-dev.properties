# =============================================================
# Quantity Measurement Application - Development Profile
# Activate with: --spring.profiles.active=dev
# Inherits base values from application.properties.
# This file only overrides what differs from the base config.
# =============================================================

# H2 in-memory database - clean slate on every restart
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================================
# Google OAuth2 - development credentials
# Obtain from: https://console.cloud.google.com -> APIs & Services -> Credentials
# Production credentials are injected as OS environment variables
# in application-prod.properties and must never be hardcoded there.
# =============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-google-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-google-secret}
spring.security.oauth2.client.registration.google.scope=profile,email

# =============================================================
# GitHub OAuth2 - development credentials
# Obtain from: https://github.com/settings/developers -> OAuth Apps -> New OAuth App
#
# Homepage URL:                 http://localhost:8080
# Authorization callback URL:   http://localhost:8080/login/oauth2/code/github
#
# The user:email scope requests the user's email address.
# GitHub only returns the email if it is not set to private on the account.
# =============================================================
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:dummy-github-id}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:dummy-github-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# Verbose logging for active development
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# =============================================================
# JWT Configuration - development default
# To generate a new secret: openssl rand -base64 32
# =============================================================
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjcmV0LWtleS1mb3Itand0LXRva2Vucy10aGF0LWlzLWF0LWxlYXN0LTMya2ItbG9uZw==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================================
# OAuth2 redirect URI
# Where the browser lands after a successful OAuth2 login (any provider).
# For Swagger UI testing: http://localhost:8080/swagger-ui.html
# For a separate frontend SPA: http://localhost:3000/oauth2/callback
# =============================================================
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/oauth2/callback}

# =============================================================
# CORS - allowed origins for the dev profile
# Covers the default ports used by React (3000) and Vite (5173)
# Add more origins as comma-separated values when needed
# =============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
