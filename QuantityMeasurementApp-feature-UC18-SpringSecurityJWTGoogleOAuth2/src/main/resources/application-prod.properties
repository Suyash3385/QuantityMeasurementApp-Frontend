# =============================================================
# Quantity Measurement Application - Production Profile
# Activate with: --spring.profiles.active=prod
#
# All sensitive values are injected as OS environment variables
# by your deployment platform (Docker, Kubernetes, cloud run,
# CI/CD pipeline, etc.). This is the standard approach for
# microservices and cloud deployments - no .env file is used.
#
# Required environment variables:
#   DB_URL               jdbc:mysql://host:3306/db?useSSL=true&serverTimezone=UTC
#   DB_USERNAME          your database username
#   DB_PASSWORD          your database password
#   JWT_SECRET           base64-encoded secret, min 32 bytes (openssl rand -base64 32)
#   JWT_EXPIRATION_MS    token lifetime in ms (86400000 = 24h)
#   GOOGLE_CLIENT_ID     from Google Cloud Console -> Credentials
#   GOOGLE_CLIENT_SECRET from Google Cloud Console -> Credentials
#   GITHUB_CLIENT_ID     from GitHub -> Settings -> Developer settings -> OAuth Apps
#   GITHUB_CLIENT_SECRET from GitHub -> Settings -> Developer settings -> OAuth Apps
#   OAUTH2_REDIRECT_URI  https://yourdomain.com/oauth2/callback
#   CORS_ALLOWED_ORIGINS  https://your-frontend.example.com (comma-separated)
# =============================================================

# MySQL datasource - all values injected from environment
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Switch to 'validate' once the schema is stable in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 console is never available in production
spring.h2.console.enabled=false

# Reduced log verbosity to minimise I/O overhead
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Swagger UI disabled in production
# Re-enable behind an auth gateway if internal API docs are needed
springdoc.swagger-ui.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# JWT - injected from environment; never hardcode in this file
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Google OAuth2 - injected from environment
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# GitHub OAuth2 - injected from environment
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI}

# =============================================================
# CORS - allowed origins for the production profile
# Inject CORS_ALLOWED_ORIGINS as a comma-separated list of
# trusted frontend origins, e.g.:
#   CORS_ALLOWED_ORIGINS=https://your-frontend.example.com
# =============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
