# =============================================================
# Quantity Measurement Application - Test Profile
# Applied automatically when tests use @ActiveProfiles("test").
# Uses a separate H2 in-memory database for full test isolation.
# All values are hardcoded stubs - no external dependencies.
# =============================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.h2.console.enabled=true

# Suppress excessive logging during test runs
logging.level.root=WARN
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.hibernate.SQL=WARN

springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Stub Google OAuth2 so the application context starts without real credentials.
# These values are intentionally fake - they only satisfy Spring's auto-configuration.
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile

# Stub GitHub OAuth2 - same purpose as the Google stub above.
# Without this, Spring's OAuth2 auto-configuration fails to start when
# spring-boot-starter-oauth2-client is on the classpath and a github
# registration is defined in application.properties.
spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-client-secret
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# JWT secret is a fixed test value. Safe to commit - test-only, never used in production.
app.jwt.secret=dGhpcyBpcyBhIHZlcnkgc2VjdXJlIGp3dCBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudA==
app.jwt.expiration-ms=86400000

app.oauth2.redirect-uri=http://localhost:8080/swagger-ui.html

# =============================================================
# Spring Mail — test profile stub (UC19)
# The spring-boot-starter-mail auto-configuration requires a
# host property to start. These are intentionally fake values;
# actual SMTP connections are never made in tests because
# JavaMailSender is replaced with a @MockBean in every test
# class that touches EmailService.
# =============================================================
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
